<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bloxfruit.css">
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <div class="picture">
                <img src="../img/Blox Fruits.webp" alt="Blox Fruits">
            </div>
            <button><a href="https://www.roblox.com/share?code=93df3c0e4e02a54f953fd53150022ecd&type=ExperienceDetails&stamp=1781383792371">Play on Roblox</a></button>
            <div class="flov">
                <div id="gamer" class="nav">
                    <p>Created By</p>
                    <h3>Gamer Roblox Inc</h3>
                </div>
                <div id="created" class="nav">
                    <p>Created</p>
                    <h3>7 years ago</h3>
                </div>
                <div id="genre" class="nav">
                    <p>Genre</p>
                    <h3>Adventure</h3>
                </div>
                <div id="max" class="nav">
                    <p>Max Players</p>
                    <h3>12</h3>
                </div>
            </div>
        </div>
    </div>
    <div class="sentes">
        <h1>Primary Stats</h1>
    </div>
    <div class="info">
        <div class="fact">
            <div id="players" class="info-line">
                <p>Players</p>
                <h3>454,549</h3>
            </div>
            <div id="visits" class="info-line">
                <p>Visits</p>
                <h3>58,163,600,566</h3>
            </div>
            <div id="upvotes" class="info-line">
                <p>Upvotes</p>
                <h3>11,376,231</h3>
            </div>
            <div id="downvotes" class="info-line">
                <p>Downvotes</p>
                <h3>1,007,553</h3>
            </div>
            <div id="favorites" class="info-line">
                <p>Favoties</p>
                <h3>17,732,520</h3>
            </div>
            <div id="time" class="info-line">
                <p>Average Playtime</p>
                <h3>19.41 Minutes</h3>
            </div>
            <div id="updated" class="info-line">
                <p>Game Updated</p>
                <h3>28 minutes ago</h3>
            </div>
            <div id="raiting" class="info-line">
                <p>Rating</p>
                <h3>91.864%</h3>
            </div>
        </div>
    </div>
</body>
</html>
